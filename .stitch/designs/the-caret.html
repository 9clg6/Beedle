<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-tertiary-fixed-variant": "#653e0f",

                    "fontFamily": {

                        "label": ["Space Grotesk"],

        }

<style>
        .squircle-smoothing {
            border-radius: 180px; /* Base for 720px */
            /* Note: Actual iOS-style squircle smoothing 0.6 is approximated via high radius or clip-path in standard CSS */
            mask-image: paint(squircle); 
        }
        .ambient-shadow {
            box-shadow: 0 20px 40px rgba(28, 28, 25, 0.06);
        }
        .ink-text {
            color: #0A0A0A;
        }
        .meta-text {
            color: #6C645A;
        }
    </style>
</head>
<body class="bg-[#F8F4ED] font-body text-on-background min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- TopNavBar from JSON -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#fcf9f4] dark:bg-stone-950 flex justify-between items-center px-8 py-6 max-w-screen-2xl mx-auto">
<div class="flex items-center gap-4">
<span class="text-xl font-bold text-stone-900 dark:text-stone-100 font-['Epilogue'] tracking-tight">The Archivist</span>
</div>
<nav class="hidden md:flex items-center gap-8 font-['Epilogue'] tracking-tight">
<a class="text-[#ff6b2e] dark:text-orange-400 font-bold transition-all scale-95 active:opacity-80" href="#">Gallery</a>
<a class="text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 transition-colors" href="#">Specs</a>
<a class="text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 transition-colors" href="#">Release</a>
</nav>
<div class="flex items-center">
<button class="p-2 transition-all scale-95 active:opacity-80">
<span class="material-symbols-outlined text-stone-900 dark:text-stone-100">menu</span>
</button>
</div>
</header>
<!-- SideNavBar (Suppressed due to focused layout intent) -->
<!-- Main Canvas Content -->
<main class="w-full h-full flex flex-col items-center justify-center p-8 relative">
<!-- Aurora Glow for the Hero Icon -->
<div class="absolute inset-0 flex items-center justify-center -z-10 opacity-30 pointer-events-none">
<div class="w-[800px] h-[800px] bg-gradient-to-tr from-[#FFFBF5] to-[#FFC48A] rounded-full blur-[120px]"></div>
</div>
<!-- The Hero Icon Squircle -->
<div class="relative w-[720px] h-[720px] bg-[#FBF8F3] ambient-shadow flex items-center justify-center" style="border-radius: 144px;">
<!-- The Caret Graphic -->
<div class="flex w-full h-full items-center justify-center">
<!-- Shifted slightly left horizontally: translate-x-[-15px] -->
<div class="w-[50px] h-[180px] bg-[#FF6B2E] rounded-[8px] transform -translate-x-[40px]"></div>
</div>
</div>
<!-- Editorial Captions -->
<div class="mt-12 text-center space-y-1">
<h1 class="font-mono text-[14px] ink-text uppercase tracking-tight">
                The Caret
            </h1>
<p class="font-mono text-[11px] meta-text tracking-[1.5px]">
                Beedle · app icon concept 2/2
            </p>
</div>
</main>
<!-- Bottom Metadata Section (Editorial Detail) -->
<footer class="fixed bottom-12 w-full flex justify-between px-12 items-end pointer-events-none">
<div class="flex flex-col gap-2">
<div class="w-12 h-[1px] bg-outline-variant/30"></div>
<span class="font-label text-[10px] uppercase tracking-widest text-secondary">Project: Archive_01</span>
</div>
<div class="flex items-center gap-6">
<div class="flex flex-col text-right">
<span class="font-mono text-[10px] text-tertiary">#FF6B2E</span>
<span class="font-mono text-[10px] text-tertiary">EMBER_ORANGE</span>
</div>
<div class="w-1 h-1 bg-primary-container rounded-full"></div>
</div>
</footer>
<!-- Image Generation Data-Alt (Though primarily CSS based here) -->
<div class="hidden">
<div data-alt="A clean minimalist design presentation of a warm cream square with rounded corners sitting on a slightly darker warm background, featuring a single orange rectangle as a logo."></div>
</div>
