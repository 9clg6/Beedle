name: beedle
description: "La veille qui se rappelle à toi — screenshots tech transformés en fiches IA."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.3
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Immutability & serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1

  # Navigation
  auto_route: ^11.1.0

  # Localization
  easy_localization: ^3.0.5

  # HTTP / Worker client
  dio: ^5.4.3+1

  # Local persistence + vector search
  objectbox: ^5.3.1
  objectbox_flutter_libs: ^5.3.1
  path_provider: ^2.1.2
  path: ^1.9.0

  # OCR on-device
  google_mlkit_text_recognition: ^0.15.1

  # Capture pipeline
  image_picker: ^1.0.7
  receive_sharing_intent: ^1.8.0
  workmanager: ^0.9.0+3

  # Native share sheet (viral moment — onboarding écran 14)
  share_plus: ^10.0.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # OS permissions (photos on iOS, notifications status on Android)
  permission_handler: ^11.3.1

  # Monetization
  purchases_flutter: ^9.16.1

  # Secrets / local storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.3

  # Utilities
  connectivity_plus: ^7.1.1
  uuid: ^4.4.2
  crypto: ^3.0.3
  url_launcher: ^6.3.0
  package_info_plus: ^9.0.1
  rxdart: ^0.28.0
  gap: ^3.0.1
  intl: any

  # UI & Design
  figma_squircle: ^0.6.3
  flutter_svg: ^2.0.10+1
  flutter_markdown: ^0.7.4+3
  google_fonts: ^6.2.1 # Hanken Grotesk + Geist Mono + Doto
  liquid_glass_renderer: ^0.2.0-dev.4 # Apple Liquid Glass authentique (opt-in)

  # Logging
  logger: ^2.4.0

  # Firebase (core + crashlytics + analytics + auth + push)
  firebase_core: ^3.8.0
  firebase_crashlytics: ^4.1.5
  firebase_analytics: ^11.3.5
  firebase_auth: ^5.3.3
  firebase_messaging: ^15.1.5

  # Auth providers (Google + Apple Sign In)
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lints
  very_good_analysis: ^10.1.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0+1
  auto_route_generator: ^10.4.0
  objectbox_generator: ^5.3.1
  flutter_gen_runner: ^5.6.0

  # App icon generation — takes a 1024×1024 PNG master and produces all the
  # iOS/Android/web asset sizes required by the stores.
  # Usage: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

  # Native splash screen (shown before Flutter engine boots).
  # Replaces the generic Flutter launch screen with the Beedle Dot-b icon.
  # Usage: dart run flutter_native_splash:create
  flutter_native_splash: ^2.4.3

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/branding/
    - assets/onboarding/
    - assets/onboarding/samples/

flutter_gen:
  output: lib/gen
  integrations:
    flutter_svg: true

# App icon generation — see docs/app-icon-generation.md for the full pipeline.
#
# Source of truth: assets/branding/icon-source-1024.png (produced by
# `dart run tool/render_icon.dart`, itself rendering the BeedleIconAsset
# widget at 1024×1024 with the exact Hanken Grotesk 'b' + ember dot).
#
# Command: `dart run flutter_launcher_icons`
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/branding/icon-source-1024.png"
  min_sdk_android: 21
  # Adaptive icon for Android 8+ (foreground layer floats over a solid
  # background — we use the Aurora warm cream #FFFBF5 as base layer and
  # only the 'b' + dot in the foreground for the classic launcher shape.
  # The adaptive icon is separate from `image_path`.
  adaptive_icon_background: "#FFFBF5"
  adaptive_icon_foreground: "assets/branding/icon-adaptive-foreground-1024.png"
  # Monochrome adaptive icon (Android 13+ themed icons feature — the system
  # tints this silhouette based on user wallpaper).
  adaptive_icon_monochrome: "assets/branding/icon-notification-monochrome-1024.png"
  # iOS dark mode icon (iOS 18+ alternate image in xcassets)
  ios_dark_mode_image_path: "assets/branding/icon-dot-b-dark-1024.png"
  # Tinted mode (iOS 18) — uses the same monochrome silhouette
  ios_tinted_mode_image_path: "assets/branding/icon-notification-monochrome-1024.png"
  # Web favicon
  web:
    generate: true
    image_path: "assets/branding/icon-source-1024.png"
    background_color: "#FBF8F3"
    theme_color: "#FF6B2E"
  remove_alpha_ios: true

# Native splash screen (shown before the Flutter engine boots, before
# SplashScreen.dart takes over). Replaces the generic Flutter launch
# placeholder with the Beedle Dot-b logo on the warm cream background.
#
# Command: `dart run flutter_native_splash:create`
flutter_native_splash:
  # Background color of the splash canvas — matches the top of the Aurora
  # gradient so the Dot-b squircle image blends cleanly into the surface.
  color: "#FFFBF5"
  # Main image: the full Dot-b squircle logo (with its own gradient).
  # iOS uses it as-is; Android < 12 uses it centered on `color`.
  image: "assets/branding/icon-source-1024.png"
  # Dark mode variant (iOS 13+, Android 10+)
  color_dark: "#0A0A0A"
  image_dark: "assets/branding/icon-dot-b-dark-1024.png"
  # Android 12+ splash uses a circular icon mask imposed by the OS.
  # We hand it the "adaptive foreground" (b + dot, transparent bg) so the
  # glyph fits the circle without our squircle fighting with it.
  android_12:
    color: "#FFFBF5"
    image: "assets/branding/icon-adaptive-foreground-1024.png"
    icon_background_color: "#FFFBF5"
    color_dark: "#0A0A0A"
    image_dark: "assets/branding/icon-adaptive-foreground-1024.png"
    icon_background_color_dark: "#0A0A0A"
  ios: true
  android: true
  web: false  # our in-app SplashScreen.dart handles the web first paint
